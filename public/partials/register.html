<!-- Register Section -->
<section id="register-section" class="hidden flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-plus text-blue-600 text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold">Join Us Today</h2>
            <p class="text-gray-500 text-sm mt-1">Create your account to get started</p>
        </div>
        <form onsubmit="handleRegister(event)">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block mb-1.5 text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="reg-name" class="form-input" placeholder="Your full name" required>
                </div>
                <div>
                    <label class="block mb-1.5 text-sm font-medium text-gray-700">Coaching Center</label>
                    <input type="text" id="reg-coaching" class="form-input" placeholder="Center name" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="block mb-1.5 text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="mb-4">
                <label class="block mb-1.5 text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="reg-password" class="form-input" placeholder="Create a password" required>
            </div>
            <div class="mb-6">
                <label class="block mb-1.5 text-sm font-medium text-gray-700">Phone</label>
                <input type="text" id="reg-phone" class="form-input" placeholder="+91 7699738819" required>
            </div>
            <button type="submit" id="register-btn" class="btn btn-primary w-full py-3 text-base">
                <span class="btn-text">Create Account</span>
            </button>
            <p class="text-center text-sm text-gray-500 mt-5">
                Already have an account? <a href="#login" class="text-blue-600 font-medium hover:underline">Login</a>
            </p>
        </form>
    </div>
</section>
