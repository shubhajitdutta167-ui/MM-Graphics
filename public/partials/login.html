<!-- Login Section -->
<section id="login-section" class="hidden flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-sign-in-alt text-blue-600 text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold">Welcome Back!</h2>
            <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block mb-1.5 text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="mb-6">
                <label class="block mb-1.5 text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary w-full py-3 text-base">
                <span class="btn-text">Login</span>
            </button>
            <p class="text-center text-sm text-gray-500 mt-5">
                Don't have an account? <a href="#register" class="text-blue-600 font-medium hover:underline">Sign up</a>
            </p>
        </form>
    </div>
</section>
