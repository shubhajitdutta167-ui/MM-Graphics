[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["models/**", "routes/**"]

# Redirect all /api/* requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

# SPA fallback: serve index.html for any non-file route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
